# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
# Check the default feature set only (matches what users get with `cargo build`)
all-features = false

# ── Advisories ────────────────────────────────────────────────────────────────
[advisories]
# Deny all crates with known security vulnerabilities.
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
# Unmaintained crates are a warning, not an error — some vendored crates are
# intentionally frozen (e.g. mlua's bundled Lua).
#
# NOTE: The cargo-deny 0.19.x bundled in `EmbarkStudios/cargo-deny-action@v2`
# has a parser bug — it crashes on any advisory with a CVSS 4.0 vector
# (RUSTSEC-2026-0076 in libcrux-ml-dsa is the first, ~50+ total as of writing).
# Until upstream fixes the parser, the CI deny job is disabled in
# `.github/workflows/ci.yml`. Re-enable the job once cargo-deny supports
# CVSS 4.0. None of the affected crates are in nexrade-cache's dep tree
# (verified with `cargo tree` against the current advisory db snapshot).
ignore = [
    "RUSTSEC-2025-0141", # bincode unmaintained — no drop-in replacement for v2; acceptable risk
]

# ── Licences ──────────────────────────────────────────────────────────────────
[licenses]
version = 2
# Allow only permissive / weak-copyleft licences.  GPL and AGPL are rejected.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",       # Mozilla Public License — weak copyleft, file-level only
    "OpenSSL",
    "CC0-1.0",       # Creative Commons Zero — public domain dedication
]
# Confidence threshold for licence SPDX detection (0.0 – 1.0)
confidence-threshold = 0.8

# ── Bans ──────────────────────────────────────────────────────────────────────
[bans]
# Warn on duplicate versions of the same crate — two major versions of the
# same dep is expected (e.g. syn 1 + syn 2) so we only warn, not deny.
multiple-versions = "warn"
# Deny these crates outright — known to be problematic or replaced.
deny = [
    # openssl — we use rustls; openssl would add a C dependency
    { name = "openssl" },
    { name = "openssl-sys" },
]
# Allow these intentional duplicate versions.
skip = []
skip-tree = []

# ── Sources ───────────────────────────────────────────────────────────────────
[sources]
# Only allow crates from crates.io and our own workspace.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
